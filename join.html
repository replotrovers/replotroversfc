<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Replot Rovers FC</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="join-page">

    <div class="join-container">

        <img src="images/logo.png" alt="Replot Rovers FC Logo">

        <h1>Join Replot Rovers FC</h1>

        <p>
            Register your interest in becoming part of the Replot Rovers journey.
        </p>

        <form action="https://formspree.io/f/mzdqdewl" method="POST">

            <input
                type="text"
                name="Name"
                placeholder="Your Name"
                required>

            <input
                type="email"
                name="Email"
                placeholder="Your Email"
                required>

            <input
                type="text"
                name="Phone"
                placeholder="Phone Number">

            <select name="Interest">

                <option value="">Select Interest</option>

                <option>Player</option>

                <option>Volunteer</option>

                <option>Sponsor</option>

                <option>Supporters Club</option>

            </select>

            <textarea
                name="Message"
                rows="6"
                placeholder="Tell us a little about yourself"></textarea>

            <button type="submit">

                Submit Interest

            </button>

        </form>

    </div>

</section>

</body>

</html>
